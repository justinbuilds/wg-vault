name: Build Plugin Zip

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build ZIP
    runs-on: ubuntu-latest

    outputs:
      zip_name: ${{ steps.set-zip-name.outputs.zip_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set zip name
        id: set-zip-name
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "zip_name=wg-vault-${TAG}.zip" >> "$GITHUB_OUTPUT"
          else
            echo "zip_name=wg-vault.zip" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin directory
        run: |
          mkdir -p build/wg-vault
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='*.zip' \
            --exclude='node_modules/' \
            --exclude='build/' \
            ./ build/wg-vault/

      - name: Create zip archive
        run: |
          ZIP_NAME="${{ steps.set-zip-name.outputs.zip_name }}"
          cd build
          zip -r "../${ZIP_NAME}" wg-vault/
          cd ..
          echo "Created: ${ZIP_NAME}"
          unzip -l "${ZIP_NAME}" | head -20

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: wg-vault-zip
          path: ${{ steps.set-zip-name.outputs.zip_name }}
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: wg-vault-zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            WG Vault ${{ github.ref_name }} — Built by Webganics

            Install this zip directly in WordPress via Plugins → Add New → Upload Plugin.
            The plugin folder will be correctly named `wg-vault/`.
          files: ${{ needs.build.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
